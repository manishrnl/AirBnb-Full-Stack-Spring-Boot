#############################################
# LOGGING SETTINGS (Colorful Console)
#############################################
# Enable ANSI colors
spring.output.ansi.enabled=ALWAYS

# Default log level
logging.level.root=INFO

# Show debug info for specific packages (optional)
# logging.level.org.springframework.web=DEBUG
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Custom log pattern (pretty + colorful)
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%-5p) %clr([%15.15t]){cyan} %clr(%-40.40logger{39}){magenta} : %clr(%m){green}%n

